<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>XTOS 六维测评 单文件版</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f3f6f1;
        --surface: #ffffff;
        --soft: #f8faf8;
        --ink: #17231e;
        --muted: #65736c;
        --line: #dce5de;
        --teal: #147d7e;
        --blue: #2f65ad;
        --red: #be5b58;
        --gold: #b07d20;
        --green: #4d783e;
        --violet: #7057a5;
        --shadow: 0 18px 46px rgba(31, 47, 38, 0.11);
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-height: 100%;
        background: var(--bg);
      }

      body {
        min-height: 100vh;
        margin: 0;
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          "PingFang SC", "Microsoft YaHei", sans-serif;
        letter-spacing: 0;
        background:
          linear-gradient(135deg, rgba(20, 125, 126, 0.12), transparent 30%),
          linear-gradient(215deg, rgba(190, 91, 88, 0.12), transparent 32%),
          linear-gradient(180deg, #fbfcfa, #eef4ef);
      }

      button,
      input {
        font: inherit;
      }

      .app {
        width: min(1280px, calc(100% - 32px));
        min-height: 100vh;
        margin: 0 auto;
        padding: 24px 0 34px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
      }

      .brand-mark {
        width: 44px;
        height: 44px;
        flex: 0 0 44px;
        border-radius: 8px;
        display: grid;
        place-items: center;
        color: #fff;
        background:
          linear-gradient(145deg, rgba(255, 255, 255, 0.22), transparent 38%),
          conic-gradient(from 35deg, var(--teal), var(--blue), var(--red), var(--gold), var(--teal));
        box-shadow: 0 12px 24px rgba(20, 125, 126, 0.2);
      }

      .brand-mark svg,
      .icon-button svg {
        width: 20px;
        height: 20px;
      }

      h1 {
        margin: 0;
        font-size: clamp(25px, 4vw, 42px);
        line-height: 1.05;
        letter-spacing: 0;
      }

      .db-status {
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
        font-size: 13px;
        white-space: nowrap;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--gold);
      }

      .dot.ready {
        background: var(--teal);
      }

      .workspace {
        display: grid;
        grid-template-columns: 360px minmax(0, 1fr);
        gap: 16px;
        align-items: start;
      }

      .panel {
        border: 1px solid rgba(220, 229, 222, 0.84);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.86);
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
      }

      .input-panel {
        position: sticky;
        top: 18px;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 13px;
      }

      .panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        min-height: 40px;
      }

      h2,
      h3 {
        margin: 0;
        letter-spacing: 0;
      }

      h2 {
        font-size: 17px;
        line-height: 1.25;
      }

      h3 {
        font-size: 15px;
        line-height: 1.25;
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .icon-button {
        width: 38px;
        height: 38px;
        border: 1px solid var(--line);
        border-radius: 8px;
        display: grid;
        place-items: center;
        color: var(--ink);
        background: #fff;
        cursor: pointer;
        transition:
          transform 150ms ease,
          border-color 150ms ease,
          box-shadow 150ms ease;
      }

      .icon-button:hover {
        transform: translateY(-1px);
        border-color: rgba(20, 125, 126, 0.45);
        box-shadow: 0 10px 20px rgba(31, 48, 38, 0.08);
      }

      .score-list {
        display: flex;
        flex-direction: column;
        gap: 9px;
      }

      .score-row {
        display: grid;
        grid-template-columns: 52px 1fr 54px;
        gap: 10px;
        align-items: center;
        min-height: 52px;
        padding: 9px 10px;
        border: 1px solid rgba(220, 229, 222, 0.8);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.68);
      }

      .score-name {
        min-width: 0;
        font-weight: 750;
        font-size: 14px;
        white-space: nowrap;
      }

      input[type="range"] {
        appearance: none;
        -webkit-appearance: none;
        width: 100%;
        height: 34px;
        min-width: 0;
        margin: 0;
        background: transparent;
        cursor: pointer;
        touch-action: none;
      }

      input[type="range"]::-webkit-slider-runnable-track {
        height: 6px;
        border-radius: 999px;
        background: linear-gradient(90deg, rgba(20, 125, 126, 0.9), rgba(47, 101, 173, 0.75));
      }

      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 22px;
        height: 22px;
        margin-top: -8px;
        border: 3px solid #fff;
        border-radius: 50%;
        background: var(--teal);
        box-shadow: 0 4px 12px rgba(31, 48, 38, 0.2);
      }

      input[type="range"]::-moz-range-track {
        height: 6px;
        border-radius: 999px;
        background: linear-gradient(90deg, rgba(20, 125, 126, 0.9), rgba(47, 101, 173, 0.75));
      }

      input[type="range"]::-moz-range-thumb {
        width: 18px;
        height: 18px;
        border: 3px solid #fff;
        border-radius: 50%;
        background: var(--teal);
        box-shadow: 0 4px 12px rgba(31, 48, 38, 0.2);
      }

      input[type="number"] {
        width: 54px;
        height: 34px;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--ink);
        font-size: 16px;
        text-align: center;
        background: #fff;
      }

      .dimension-table {
        display: grid;
        gap: 7px;
        padding-top: 2px;
      }

      .dimension-line {
        display: grid;
        grid-template-columns: 52px 1fr auto;
        gap: 8px;
        align-items: center;
        color: var(--muted);
        font-size: 12px;
      }

      .mini-bar {
        height: 6px;
        border-radius: 99px;
        overflow: hidden;
        background: #e7eee8;
      }

      .mini-bar span {
        display: block;
        height: 100%;
        border-radius: inherit;
        background: var(--teal);
      }

      .result-grid {
        display: grid;
        grid-template-columns: minmax(360px, 0.95fr) minmax(420px, 1.05fr);
        gap: 16px;
        align-items: start;
      }

      .chart-panel,
      .report-panel {
        padding: 16px;
      }

      .metrics {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 9px;
        margin-bottom: 12px;
      }

      .metric {
        min-height: 76px;
        padding: 11px;
        border: 1px solid rgba(220, 229, 222, 0.82);
        border-radius: 8px;
        background: var(--soft);
      }

      .metric span {
        display: block;
        color: var(--muted);
        font-size: 12px;
      }

      .metric strong {
        display: block;
        margin-top: 7px;
        font-size: clamp(22px, 2.7vw, 30px);
        line-height: 1;
      }

      #levelName {
        font-size: clamp(19px, 2.2vw, 27px);
        line-height: 1.08;
      }

      .chart-shell {
        min-height: 390px;
        border: 1px solid rgba(220, 229, 222, 0.82);
        border-radius: 8px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.7), rgba(255, 255, 255, 0.42)),
          radial-gradient(circle at center, rgba(20, 125, 126, 0.08), transparent 56%);
        overflow: hidden;
      }

      #radarCanvas {
        display: block;
        width: 100%;
        height: 100%;
        min-height: 390px;
      }

      .style-band {
        margin-top: 12px;
        display: grid;
        grid-template-columns: minmax(130px, 0.8fr) minmax(0, 1.2fr);
        gap: 10px;
      }

      .style-name,
      .style-copy {
        border: 1px solid rgba(220, 229, 222, 0.82);
        border-radius: 8px;
        background: var(--soft);
        padding: 12px;
      }

      .style-name span,
      .source {
        display: block;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.35;
      }

      .style-name strong {
        display: block;
        margin-top: 6px;
        font-size: clamp(23px, 3.5vw, 34px);
        line-height: 1.08;
      }

      .style-copy p,
      .report-card p {
        margin: 7px 0 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.55;
      }

      .report-panel {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .report-card {
        border: 1px solid rgba(220, 229, 222, 0.82);
        border-radius: 8px;
        background: var(--surface);
        padding: 13px;
      }

      .report-card.feature {
        background: linear-gradient(135deg, rgba(20, 125, 126, 0.08), rgba(176, 125, 32, 0.08));
      }

      .split {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .course-line {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
        margin-top: 8px;
      }

      .course-line strong {
        font-size: 20px;
        line-height: 1.2;
      }

      .course-line em {
        flex: 0 0 auto;
        color: var(--teal);
        font-style: normal;
        font-weight: 800;
        font-size: 26px;
      }

      .source {
        margin-top: 8px;
      }

      .toast {
        position: fixed;
        right: 18px;
        bottom: 18px;
        z-index: 2;
        max-width: 280px;
        padding: 11px 12px;
        border-radius: 8px;
        color: #fff;
        background: rgba(23, 35, 30, 0.92);
        box-shadow: 0 15px 40px rgba(23, 35, 30, 0.22);
        opacity: 0;
        pointer-events: none;
        transform: translateY(8px);
        transition:
          opacity 160ms ease,
          transform 160ms ease;
      }

      .toast.show {
        opacity: 1;
        transform: translateY(0);
      }

      @media (max-width: 1120px) {
        .workspace,
        .result-grid {
          grid-template-columns: 1fr;
        }

        .input-panel {
          position: static;
        }
      }

      @media (max-width: 700px) {
        .app {
          width: min(100% - 24px, 620px);
          padding-top: 18px;
        }

        .topbar {
          align-items: flex-start;
          flex-direction: column;
        }

        .db-status {
          white-space: normal;
        }

        .score-row {
          grid-template-columns: 48px 1fr 52px;
        }

        .metrics,
        .split,
        .style-band {
          grid-template-columns: 1fr;
        }

        .chart-shell,
        #radarCanvas {
          min-height: 318px;
        }

        .course-line {
          align-items: flex-start;
          flex-direction: column;
          gap: 4px;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M12 3 21 8v8l-9 5-9-5V8l9-5Z" stroke="currentColor" stroke-width="1.7" />
              <path d="m12 7 5 3v4l-5 3-5-3v-4l5-3Z" stroke="currentColor" stroke-width="1.7" />
              <path d="M12 3v4m0 10v4M3 8l4 2m10 0 4-2M3 16l4-2m10 0 4 2" stroke="currentColor" stroke-width="1.7" />
            </svg>
          </div>
          <h1>XTOS 六维测评</h1>
        </div>
        <div class="db-status">
          <span class="dot" id="statusDot"></span>
          <span id="dbStatus">规则库连接中</span>
        </div>
      </header>

      <section class="workspace">
        <aside class="panel input-panel">
          <div class="panel-head">
            <h2>六维评分</h2>
            <div class="actions">
              <button class="icon-button" id="resetBtn" type="button" title="重置" aria-label="重置">
                <svg viewBox="0 0 24 24" fill="none">
                  <path d="M4 4v6h6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
                  <path d="M5.3 14a7 7 0 1 0 1.8-7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                </svg>
              </button>
              <button class="icon-button" id="copyBtn" type="button" title="复制报告" aria-label="复制报告">
                <svg viewBox="0 0 24 24" fill="none">
                  <path d="M9 9h10v11H9z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" />
                  <path d="M5 15H4V4h11v1" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
              </button>
              <button class="icon-button" id="exportBtn" type="button" title="导出雷达图" aria-label="导出雷达图">
                <svg viewBox="0 0 24 24" fill="none">
                  <path d="M12 3v12m0 0 4-4m-4 4-4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
                  <path d="M5 18v2h14v-2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
              </button>
            </div>
          </div>
          <div class="score-list" id="scoreList"></div>
          <div class="dimension-table" id="dimensionTable"></div>
        </aside>

        <section class="result-grid">
          <div class="panel chart-panel">
            <div class="metrics">
              <div class="metric">
                <span>六维总分</span>
                <strong id="totalScore">0</strong>
              </div>
              <div class="metric">
                <span>当前等级</span>
                <strong id="levelName">-</strong>
              </div>
              <div class="metric">
                <span>短板数量</span>
                <strong id="weakCount">0</strong>
              </div>
            </div>
            <div class="chart-shell">
              <canvas id="radarCanvas"></canvas>
            </div>
            <div class="style-band">
              <div class="style-name">
                <span>球风画像</span>
                <strong id="styleName">-</strong>
                <span class="source" id="styleSource">-</span>
              </div>
              <div class="style-copy">
                <h3>画像说明</h3>
                <p id="styleText">-</p>
                <p id="styleTraining">-</p>
              </div>
            </div>
          </div>

          <div class="panel report-panel">
            <article class="report-card feature">
              <h3>AI综合总结</h3>
              <p id="summaryText">-</p>
              <span class="source" id="summarySource">-</span>
            </article>

            <div class="split">
              <article class="report-card">
                <h3>优势分析</h3>
                <p id="advantageText">-</p>
                <p id="advantageValue">-</p>
                <span class="source" id="advantageSource">-</span>
              </article>
              <article class="report-card">
                <h3>短板分析</h3>
                <p id="weaknessText">-</p>
                <p id="weaknessMethod">-</p>
                <span class="source" id="weaknessSource">-</span>
              </article>
            </div>

            <article class="report-card">
              <h3>推荐专项课程</h3>
              <div class="course-line">
                <strong id="courseName">-</strong>
                <em id="hours">-</em>
              </div>
              <p id="courseLogic">-</p>
              <p id="hourReason">-</p>
              <span class="source" id="courseSource">-</span>
            </article>

            <article class="report-card">
              <h3>成长预测</h3>
              <p id="growthText">-</p>
              <p id="growthGoal">-</p>
              <p id="repurchase">-</p>
              <span class="source" id="growthSource">-</span>
            </article>

            <article class="report-card">
              <h3>教练评语</h3>
              <p id="coachText">-</p>
              <p id="coachReminder">-</p>
              <span class="source" id="coachSource">-</span>
            </article>
          </div>
        </section>
      </section>
    </main>
    <div class="toast" id="toast"></div>

    <script>
      const state = {
        db: null,
        scores: {},
        latestReport: null,
        colors: ["#147d7e", "#2f65ad", "#be5b58", "#b07d20", "#4d783e", "#7057a5"]
      };

      const els = {
        statusDot: document.querySelector("#statusDot"),
        dbStatus: document.querySelector("#dbStatus"),
        scoreList: document.querySelector("#scoreList"),
        dimensionTable: document.querySelector("#dimensionTable"),
        canvas: document.querySelector("#radarCanvas"),
        totalScore: document.querySelector("#totalScore"),
        levelName: document.querySelector("#levelName"),
        weakCount: document.querySelector("#weakCount"),
        styleName: document.querySelector("#styleName"),
        styleText: document.querySelector("#styleText"),
        styleTraining: document.querySelector("#styleTraining"),
        styleSource: document.querySelector("#styleSource"),
        summaryText: document.querySelector("#summaryText"),
        summarySource: document.querySelector("#summarySource"),
        advantageText: document.querySelector("#advantageText"),
        advantageValue: document.querySelector("#advantageValue"),
        advantageSource: document.querySelector("#advantageSource"),
        weaknessText: document.querySelector("#weaknessText"),
        weaknessMethod: document.querySelector("#weaknessMethod"),
        weaknessSource: document.querySelector("#weaknessSource"),
        courseName: document.querySelector("#courseName"),
        courseLogic: document.querySelector("#courseLogic"),
        hourReason: document.querySelector("#hourReason"),
        hours: document.querySelector("#hours"),
        courseSource: document.querySelector("#courseSource"),
        growthText: document.querySelector("#growthText"),
        growthGoal: document.querySelector("#growthGoal"),
        repurchase: document.querySelector("#repurchase"),
        growthSource: document.querySelector("#growthSource"),
        coachText: document.querySelector("#coachText"),
        coachReminder: document.querySelector("#coachReminder"),
        coachSource: document.querySelector("#coachSource"),
        resetBtn: document.querySelector("#resetBtn"),
        copyBtn: document.querySelector("#copyBtn"),
        exportBtn: document.querySelector("#exportBtn"),
        toast: document.querySelector("#toast")
      };

      async function loadDatabase() {
        const embeddedDatabase = document.querySelector("#xtos-rule-database");
        if (!embeddedDatabase?.textContent?.trim()) {
          throw new Error("embedded database unavailable");
        }
        state.db = JSON.parse(embeddedDatabase.textContent);
        initializeScores(5);
        renderInputs();
        els.statusDot.classList.add("ready");
        const totalRules = Object.values(state.db.tables || {}).reduce((sum, rows) => sum + rows.length, 0);
        els.dbStatus.textContent = `已内置 ${state.db.sourceWorkbook || "规则库"} · ${totalRules} 条规则`;
        update();
      }

      function initializeScores(defaultValue = 5) {
        state.scores = {};
        for (const dimension of state.db.dimensions) {
          state.scores[dimension.id] = defaultValue;
        }
      }

      function renderInputs() {
        const range = state.db.scoreRange;
        els.scoreList.innerHTML = "";
        for (const dimension of state.db.dimensions) {
          const row = document.createElement("label");
          row.className = "score-row";
          row.innerHTML = `
            <span class="score-name">${escapeHtml(dimension.label)}</span>
            <input type="range" min="${range.min}" max="${range.max}" step="${range.step}" value="${state.scores[dimension.id]}" data-id="${dimension.id}" aria-label="${escapeHtml(dimension.label)}滑动分数" />
            <input type="number" min="${range.min}" max="${range.max}" step="${range.step}" value="${state.scores[dimension.id]}" data-id="${dimension.id}" aria-label="${escapeHtml(dimension.label)}分数" />
          `;
          els.scoreList.appendChild(row);
        }
      }

      function onScoreInput(event) {
        const input = event.target;
        const id = input.dataset.id;
        if (!id) return;

        const range = state.db.scoreRange;
        const value = clamp(Math.round(Number(input.value)), Number(range.min), Number(range.max));
        state.scores[id] = Number.isFinite(value) ? value : Number(range.min);

        for (const paired of els.scoreList.querySelectorAll(`[data-id="${CSS.escape(id)}"]`)) {
          if (paired !== input) paired.value = state.scores[id];
        }
        update();
      }

      function update() {
        const dimensions = getDimensionScores();
        const report = buildReport(dimensions);
        state.latestReport = report;
        renderMetrics(report);
        renderDimensionTable(dimensions);
        drawRadar(dimensions);
      }

      function getDimensionScores() {
        return state.db.dimensions.map((dimension, index) => {
          const score = state.scores[dimension.id];
          return {
            ...dimension,
            index,
            score,
            segment: state.db.segmentByScore[String(score)] || segmentFromScore(score)
          };
        });
      }

      function buildReport(dimensions) {
        const total = dimensions.reduce((sum, item) => sum + item.score, 0);
        const average = total / dimensions.length;
        const strongestScore = Math.max(...dimensions.map((item) => item.score));
        const weakestScore = Math.min(...dimensions.map((item) => item.score));
        const isFlat = strongestScore === weakestScore;
        const strongest = isFlat ? [dimensions[0]] : dimensions.filter((item) => item.score === strongestScore);
        const weakest = isFlat ? [dimensions[0]] : dimensions.filter((item) => item.score === weakestScore);
        const weaknessCount = Math.max(1, dimensions.filter((item) => item.score <= 4).length || (isFlat ? 1 : weakest.length));
        const level = findLevel(total);
        const style = matchStyle(dimensions);
        const summaryRule = nearestSummaryRule(dimensions, style.name);
        const summaryText = makeSummary(total, level, style.name, strongest, weakest, strongestScore - weakestScore);
        const advantage = matchScoreAnalysis("advantageRules", "优势维度", "分数段", strongest[0]);
        const weakness = matchScoreAnalysis("weaknessRules", "短板维度", "分数段", weakest[0]);
        const course = matchCourse(weakest[0].label, strongest[0].label, style.name);
        const hour = matchHour(total, weakestScore);
        const hours = Number(hour?.["推荐课时"] || recommendedHours(total, weakestScore));
        const growth = matchGrowth(level.name, hours, weaknessCount);
        const coach = matchCoach(style.name, weakest[0].label, hours);

        return {
          dimensions,
          total,
          average,
          level,
          strongest,
          weakest,
          weaknessCount,
          style,
          summary: { text: summaryText, source: ruleSource(summaryRule, "综合总结") },
          advantage: normalizeAdvantage(advantage, strongest[0]),
          weakness: normalizeWeakness(weakness, weakest[0]),
          course: normalizeCourse(course, weakest[0], strongest[0], style.name),
          hour: normalizeHour(hour, hours),
          growth: normalizeGrowth(growth, level.name, hours, weaknessCount),
          coach: normalizeCoach(coach, style.name, weakest[0].label, hours)
        };
      }

      function findLevel(total) {
        return state.db.levelRules.find((rule) => total >= rule.min && total <= rule.max) || state.db.levelRules[state.db.levelRules.length - 1];
      }

      function matchStyle(dimensions) {
        const rows = state.db.tables.styleRules || [];
        const exact = rows.find((row) =>
          dimensions.every((item) => row[`${item.label}段`] === item.segment)
        );
        if (exact) {
          return {
            name: exact["球风画像"],
            text: exact["画像说明"],
            training: exact["适合训练方向"],
            source: ruleSource(exact, "球风画像")
          };
        }

        const styleName = heuristicStyle(dimensions);
        const top = labels(dimensions.filter((item) => item.score === Math.max(...dimensions.map((d) => d.score))));
        const low = labels(dimensions.filter((item) => item.score === Math.min(...dimensions.map((d) => d.score))));
        const lowCourse = dimensions.find((item) => item.score === Math.min(...dimensions.map((d) => d.score)))?.course;
        const topCourse = dimensions.find((item) => item.score === Math.max(...dimensions.map((d) => d.score)))?.course;
        const nearest = nearestStyleRule(dimensions, styleName);
        return {
          name: styleName,
          text: `该画像呈现${styleName}特征，优势多集中在${top}，短板多集中在${low}。`,
          training: `建议优先训练${lowCourse}，再结合${topCourse}建立个人风格。`,
          source: nearest ? `${ruleSource(nearest, "近似画像")} · 规则引擎修正` : "规则引擎修正"
        };
      }

      function heuristicStyle(dimensions) {
        const total = dimensions.reduce((sum, item) => sum + item.score, 0);
        const average = total / dimensions.length;
        const max = Math.max(...dimensions.map((item) => item.score));
        const min = Math.min(...dimensions.map((item) => item.score));
        const top = dimensions.filter((item) => item.score === max).map((item) => item.label);

        if (average <= 2.3) return "启蒙体验型";
        if (average >= 8.3 && max - min <= 2) return "全能竞技型";
        if (max - min <= 1) return average >= 6 ? "均衡成长型" : "潜力成长型";
        if (top.includes("发力")) return "力量进攻型";
        if (top.includes("瞄准")) return "准度直攻型";
        if (top.includes("走位")) return "连续走位型";
        if (top.includes("控力")) return "控制稳健型";
        if (top.includes("杆法")) return "细腻控制型";
        if (top.includes("动作")) return average >= 6 ? "主动进攻型" : "潜力成长型";
        return "潜力成长型";
      }

      function nearestStyleRule(dimensions, styleName) {
        const order = state.db.segmentOrder || ["极弱", "薄弱", "基础", "良好", "优秀"];
        const rows = state.db.tables.styleRules || [];
        return rows
          .map((row) => {
            let score = row["球风画像"] === styleName ? 5 : 0;
            for (const item of dimensions) {
              const rowSegment = row[`${item.label}段`];
              const diff = Math.abs(order.indexOf(rowSegment) - order.indexOf(item.segment));
              score += rowSegment === item.segment ? 8 : Math.max(0, 4 - diff);
            }
            return { row, score };
          })
          .sort((a, b) => b.score - a.score)[0]?.row;
      }

      function nearestSummaryRule(dimensions, styleName) {
        const rows = state.db.tables.summaryRules || [];
        return rows
          .map((row) => {
            let distance = row["球风画像"] === styleName ? -8 : 0;
            for (const item of dimensions) {
              distance += Math.abs(Number(row[item.label] || 0) - item.score);
            }
            return { row, distance };
          })
          .sort((a, b) => a.distance - b.distance)[0]?.row;
      }

      function makeSummary(total, level, styleName, strongest, weakest, spread) {
        if (spread <= 1) {
          return `该学员六维总分${total}/60，处于${level.summaryName || level.name}，球风画像为${styleName}。当前六维结构较均衡，建议先以${labels(weakest)}作为训练入口建立稳定击球框架，再逐步放大进球、控球和连续得分能力。`;
        }
        return `该学员六维总分${total}/60，处于${level.summaryName || level.name}，球风画像为${styleName}。当前优势集中在${labels(strongest)}，短板主要在${labels(weakest)}。训练上建议先稳定短板，再围绕优势建立连续得分能力。`;
      }

      function matchScoreAnalysis(tableName, dimensionKey, scoreKey, dimension) {
        const rows = state.db.tables[tableName] || [];
        const exact = rows.filter((row) => row[dimensionKey] === dimension.label && Number(row[scoreKey]) === dimension.score);
        if (exact.length) return pickRule(exact, dimension.score + dimension.index);
        const sameDimension = rows
          .filter((row) => row[dimensionKey] === dimension.label)
          .map((row) => ({ row, diff: Math.abs(Number(row[scoreKey]) - dimension.score) }))
          .sort((a, b) => a.diff - b.diff);
        return sameDimension[0]?.row;
      }

      function matchCourse(lowest, highest, styleName) {
        const rows = state.db.tables.courseRules || [];
        return (
          rows.find((row) => row["最低维度"] === lowest && row["最高维度"] === highest && row["球风画像"] === styleName) ||
          rows.find((row) => row["最低维度"] === lowest && row["最高维度"] === highest) ||
          rows.find((row) => row["最低维度"] === lowest && row["球风画像"] === styleName) ||
          rows.find((row) => row["最低维度"] === lowest)
        );
      }

      function matchHour(total, minScore) {
        return (state.db.tables.hourRules || []).find((row) => {
          return (
            total >= Number(row["总分下限"]) &&
            total <= Number(row["总分上限"]) &&
            minScore >= Number(row["最低分下限"]) &&
            minScore <= Number(row["最低分上限"])
          );
        });
      }

      function matchGrowth(levelName, hours, weaknessCount) {
        const rows = state.db.tables.growthRules || [];
        return (
          rows.find((row) => row["当前等级"] === levelName && Number(row["推荐课时"]) === hours && Number(row["短板数量"]) === weaknessCount) ||
          rows
            .filter((row) => row["当前等级"] === levelName && Number(row["推荐课时"]) === hours)
            .map((row) => ({ row, diff: Math.abs(Number(row["短板数量"]) - weaknessCount) }))
            .sort((a, b) => a.diff - b.diff)[0]?.row ||
          rows.find((row) => row["当前等级"] === levelName)
        );
      }

      function matchCoach(styleName, lowest, hours) {
        const rows = state.db.tables.coachRules || [];
        return (
          rows.find((row) => row["球风画像"] === styleName && row["最低维度"] === lowest && Number(row["推荐课时"]) === hours) ||
          rows.find((row) => row["最低维度"] === lowest && Number(row["推荐课时"]) === hours) ||
          rows.find((row) => row["最低维度"] === lowest)
        );
      }

      function normalizeAdvantage(row, dimension) {
        return {
          text: row?.["优势分析"] || `${dimension.label}当前相对突出，可作为课程切入点建立正反馈。`,
          value: row?.["可转化训练价值"] || `可将${dimension.label}作为优势牵引，带动其它维度提升。`,
          source: ruleSource(row, "优势分析")
        };
      }

      function normalizeWeakness(row, dimension) {
        return {
          text: row?.["短板分析"] || `${dimension.label}是当前优先修正环节，会影响稳定性、连续性和实战发挥。`,
          method: row?.["优先修正方法"] || `先用低难度固定球型训练${dimension.label}，再进入连续球和实战局面验证。`,
          source: ruleSource(row, "短板分析")
        };
      }

      function normalizeCourse(row, low, high, styleName) {
        return {
          name: row?.["推荐专项课程"] || `${low.course} + ${high.course}`,
          logic: row?.["课程组合逻辑"] || `先补${low.label}短板，再放大${high.label}优势，形成更清晰的${styleName}训练路径。`,
          suitable: row?.["适合学员"] || `适合${low.label}薄弱、${high.label}相对突出的学员。`,
          source: ruleSource(row, "课程规则")
        };
      }

      function normalizeHour(row, hours) {
        return {
          hours,
          reason: row?.["推荐理由"] || "适合做小周期专项强化，预计能明显改善一个核心短板。",
          sales: row?.["转化话术"] || `根据当前总分和最低短板，建议先选择${hours}节课，保证训练效果可被学员感知。`,
          source: ruleSource(row, "课时规则")
        };
      }

      function normalizeGrowth(row, levelName, hours, weaknessCount) {
        return {
          text: row?.["成长预测"] || `完成${hours}节课后，预计可改善${weaknessCount}个主要短板中的核心问题，整体稳定性提升一个小阶段。`,
          goal: row?.["阶段目标"] || `当前目标是从${levelName}向下一阶段过渡，先解决最影响进球和连续性的环节。`,
          repurchase: row?.["复购建议"] || "课后根据测评复测结果，推荐继续购买专项强化包。",
          source: ruleSource(row, "成长预测")
        };
      }

      function normalizeCoach(row, styleName, lowest, hours) {
        return {
          text: row?.["教练评语"] || `该学员属于${styleName}，目前最需要优先修正${lowest}。建议安排${hours}节课，以专项课程为主线。`,
          reminder: row?.["训练提醒"] || "训练时不要一次性加入过多复杂内容，先让学员感受到稳定提升。",
          source: ruleSource(row, "教练评语")
        };
      }

      function recommendedHours(total, minScore) {
        if (total <= 23 || minScore <= 2) return 20;
        if (total <= 35 || minScore <= 4) return 10;
        if (total <= 47 || minScore <= 6) return 5;
        if (total <= 53 || minScore <= 8) return 3;
        return 1;
      }

      function renderMetrics(report) {
        els.totalScore.textContent = report.total;
        els.levelName.textContent = report.level.name.replace(" ", "\n");
        els.weakCount.textContent = report.weaknessCount;
        els.styleName.textContent = report.style.name;
        els.styleText.textContent = report.style.text;
        els.styleTraining.textContent = report.style.training;
        els.styleSource.textContent = report.style.source;
        els.summaryText.textContent = report.summary.text;
        els.summarySource.textContent = report.summary.source;
        els.advantageText.textContent = report.advantage.text;
        els.advantageValue.textContent = report.advantage.value;
        els.advantageSource.textContent = report.advantage.source;
        els.weaknessText.textContent = report.weakness.text;
        els.weaknessMethod.textContent = report.weakness.method;
        els.weaknessSource.textContent = report.weakness.source;
        els.courseName.textContent = report.course.name;
        els.courseLogic.textContent = `${report.course.logic} ${report.course.suitable}`;
        els.hourReason.textContent = `${report.hour.reason} ${report.hour.sales}`;
        els.hours.textContent = `${report.hour.hours}节`;
        els.courseSource.textContent = `${report.course.source} / ${report.hour.source}`;
        els.growthText.textContent = report.growth.text;
        els.growthGoal.textContent = report.growth.goal;
        els.repurchase.textContent = report.growth.repurchase;
        els.growthSource.textContent = report.growth.source;
        els.coachText.textContent = report.coach.text;
        els.coachReminder.textContent = report.coach.reminder;
        els.coachSource.textContent = report.coach.source;
      }

      function renderDimensionTable(dimensions) {
        els.dimensionTable.innerHTML = "";
        for (const item of dimensions) {
          const line = document.createElement("div");
          line.className = "dimension-line";
          line.innerHTML = `
            <span>${escapeHtml(item.label)}</span>
            <span class="mini-bar"><span style="width:${item.score * 10}%"></span></span>
            <span>${item.score} · ${escapeHtml(item.segment)}</span>
          `;
          els.dimensionTable.appendChild(line);
        }
      }

      function drawRadar(dimensions) {
        const canvas = els.canvas;
        const rect = canvas.parentElement.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        const width = Math.max(320, rect.width);
        const height = Math.max(300, rect.height);
        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);
        canvas.style.width = `${width}px`;
        canvas.style.height = `${height}px`;

        const ctx = canvas.getContext("2d");
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.clearRect(0, 0, width, height);

        const centerX = width / 2;
        const centerY = height / 2;
        const radius = Math.min(width, height) * 0.31;
        const labelOffset = Math.min(32, Math.max(23, radius * 0.24));
        const rings = 5;

        ctx.lineJoin = "round";
        ctx.lineCap = "round";
        ctx.font = "13px Inter, system-ui, sans-serif";

        for (let ring = rings; ring >= 1; ring -= 1) {
          const ringRadius = (radius * ring) / rings;
          const points = dimensions.map((_, index) => pointAt(index, dimensions.length, ringRadius, centerX, centerY));
          ctx.beginPath();
          points.forEach((point, index) => {
            if (index === 0) ctx.moveTo(point.x, point.y);
            else ctx.lineTo(point.x, point.y);
          });
          ctx.closePath();
          ctx.fillStyle = ring % 2 === 0 ? "rgba(20, 125, 126, 0.04)" : "rgba(47, 101, 173, 0.04)";
          ctx.strokeStyle = "rgba(101, 115, 108, 0.22)";
          ctx.lineWidth = 1;
          ctx.fill();
          ctx.stroke();
        }

        dimensions.forEach((dimension, index) => {
          const outer = pointAt(index, dimensions.length, radius, centerX, centerY);
          const label = pointAt(index, dimensions.length, radius + labelOffset, centerX, centerY);
          ctx.beginPath();
          ctx.moveTo(centerX, centerY);
          ctx.lineTo(outer.x, outer.y);
          ctx.strokeStyle = "rgba(101, 115, 108, 0.2)";
          ctx.stroke();

          ctx.fillStyle = state.colors[index % state.colors.length];
          ctx.beginPath();
          ctx.arc(outer.x, outer.y, 4, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = "#17231e";
          ctx.textAlign = label.x < centerX - 10 ? "right" : label.x > centerX + 10 ? "left" : "center";
          ctx.textBaseline = label.y < centerY ? "bottom" : "top";
          ctx.fillText(dimension.label, label.x, label.y);
        });

        const valuePoints = dimensions.map((dimension, index) => {
          const ratio = clamp(dimension.score / 10, 0, 1);
          return pointAt(index, dimensions.length, radius * ratio, centerX, centerY);
        });
        const gradient = ctx.createLinearGradient(centerX - radius, centerY - radius, centerX + radius, centerY + radius);
        gradient.addColorStop(0, "rgba(20, 125, 126, 0.38)");
        gradient.addColorStop(0.55, "rgba(47, 101, 173, 0.28)");
        gradient.addColorStop(1, "rgba(190, 91, 88, 0.28)");

        ctx.beginPath();
        valuePoints.forEach((point, index) => {
          if (index === 0) ctx.moveTo(point.x, point.y);
          else ctx.lineTo(point.x, point.y);
        });
        ctx.closePath();
        ctx.fillStyle = gradient;
        ctx.strokeStyle = "#147d7e";
        ctx.lineWidth = 2.5;
        ctx.fill();
        ctx.stroke();

        valuePoints.forEach((point, index) => {
          ctx.beginPath();
          ctx.arc(point.x, point.y, 5, 0, Math.PI * 2);
          ctx.fillStyle = "#ffffff";
          ctx.fill();
          ctx.lineWidth = 2;
          ctx.strokeStyle = state.colors[index % state.colors.length];
          ctx.stroke();
        });
      }

      function pointAt(index, total, radius, centerX, centerY) {
        const angle = -Math.PI / 2 + (Math.PI * 2 * index) / total;
        return {
          x: centerX + Math.cos(angle) * radius,
          y: centerY + Math.sin(angle) * radius
        };
      }

      function copyReport() {
        if (!state.latestReport) return;
        const report = state.latestReport;
        const text = [
          "XTOS 六维测评报告",
          `六维总分：${report.total}/60`,
          `当前等级：${report.level.name}`,
          `球风画像：${report.style.name}`,
          `AI综合总结：${report.summary.text}`,
          `优势分析：${report.advantage.text} ${report.advantage.value}`,
          `短板分析：${report.weakness.text} ${report.weakness.method}`,
          `推荐专项课程：${report.course.name}`,
          `推荐课时：${report.hour.hours}节`,
          `成长预测：${report.growth.text} ${report.growth.goal}`,
          `教练评语：${report.coach.text} ${report.coach.reminder}`
        ].join("\n");

        navigator.clipboard
          ?.writeText(text)
          .then(() => showToast("报告已复制"))
          .catch(() => showToast("当前浏览器不支持复制"));
      }

      function exportRadar() {
        const link = document.createElement("a");
        link.download = "XTOS六维雷达图.png";
        link.href = els.canvas.toDataURL("image/png");
        link.click();
      }

      function showToast(text) {
        els.toast.textContent = text;
        els.toast.classList.add("show");
        window.setTimeout(() => els.toast.classList.remove("show"), 1800);
      }

      function labels(items) {
        return items.map((item) => item.label).join("、");
      }

      function pickRule(rows, seed) {
        return rows[Math.abs(seed) % rows.length];
      }

      function ruleSource(row, fallback) {
        return row ? `${fallback} · 专业规则库` : `${fallback} · 规则引擎`;
      }

      function segmentFromScore(score) {
        if (score <= 2) return "极弱";
        if (score <= 4) return "薄弱";
        if (score <= 6) return "基础";
        if (score <= 8) return "良好";
        return "优秀";
      }

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      els.scoreList.addEventListener("input", onScoreInput);
      els.resetBtn.addEventListener("click", () => {
        initializeScores(5);
        for (const input of els.scoreList.querySelectorAll("input")) input.value = 5;
        update();
      });
      els.copyBtn.addEventListener("click", copyReport);
      els.exportBtn.addEventListener("click", exportRadar);
      window.addEventListener("resize", () => window.requestAnimationFrame(() => state.latestReport && drawRadar(state.latestReport.dimensions)));

      window.addEventListener("DOMContentLoaded", () => {
        loadDatabase().catch((error) => {
          console.error(error);
          els.dbStatus.textContent = "规则库读取失败";
        });
      });
    </script>
